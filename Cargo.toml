[package]
name = "spoticord"
version = "2.1.3"
edition = "2021"
rust-version = "1.65.0"

[[bin]]
name = "spoticord"
path = "src/main.rs"

[features]
stats = ["redis"]

[dependencies]
anyhow = "1.0.75"
dotenvy = "0.15.7"
env_logger = "0.10.0"
hex = "0.4.3"
lazy_static = "1.4.0"
librespot = { version = "0.4.2", default-features = false }
log = "0.4.20"
protobuf = "2.28.0"
redis = { version = "0.23.3", optional = true, default-features = false }
reqwest = { version = "0.11.22", default-features = false }
samplerate = "0.2.4"
serde = "1.0.192"
serde_json = "1.0.108"
serenity = { version = "0.11.7", features = ["framework", "cache", "standard_framework", "rustls_backend", "gateway"], default-features = false }
songbird = { version = "0.3.2", features = ["driver", "serenity-rustls"], default-features = false }
thiserror = "1.0.50"
tokio = { version = "1.34.0", features = ["rt", "full"] }
zerocopy = "0.7.25"

[profile.release]
opt-level = 3
lto = true
